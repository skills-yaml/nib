version: '3'

# nib - Task runner for the AI coding + workload agent.
# All development, checking, and automation must go through these tasks.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # --- Python / uv environment ---
  install:
    desc: Install dependencies with uv (including dev)
    cmds:
      - uv sync --all-extras

  # --- Formatting & Linting ---
  fmt:
    desc: Format code with ruff
    cmds:
      - uv run ruff format src tests

  lint:
    desc: Lint with ruff
    cmds:
      - uv run ruff check src tests

  typecheck:
    desc: Static type checking with pyright
    cmds:
      - uv run pyright

  check:
    desc: Run all quality gates (format check + lint + types)
    cmds:
      - uv run ruff format --check src tests
      - task: lint
      - task: typecheck

  # --- Testing ---
  test:
    desc: Run the test suite
    cmds:
      - uv run pytest -q

  test:watch:
    desc: Run tests continuously (requires pytest-watch or similar)
    cmds:
      - uv run pytest --looponfail

  # --- Development convenience ---
  dev:
    desc: Install + run a quick smoke check
    cmds:
      - task: install
      - task: check
      - task: test
      - uv run nib --help

  clean:
    desc: Remove Python cache and build artifacts
    cmds:
      - find . -type d -name '__pycache__' -exec rm -rf {} +
      - find . -type d -name '.ruff_cache' -exec rm -rf {} +
      - find . -type d -name '.pytest_cache' -exec rm -rf {} +
      - rm -rf .venv uv.lock  # careful - only if you want a full reset

  # --- Future / placeholders ---
  tui:
    desc: Run the nib TUI directly
    cmds:
      - uv run nib tui

  build:
    desc: Build the package (wheel + sdist)
    cmds:
      - uv build
