version: '3'

# nib - Task runner (Rust CLI + Python core).
# Follows skm project CI/Task structure.
# All checks, tests, and builds go through these tasks.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  check:
    desc: Run formatting, lint, and compile checks
    cmds:
      - cargo fmt -- --check
      - cargo clippy -- -D warnings
      - cargo check

  fix:
    desc: Auto-format and apply clippy fixes
    cmds:
      - cargo fmt
      - cargo clippy --fix --allow-dirty --allow-no-vcs

  test:
    desc: Run unit and integration tests
    cmds:
      - cargo test -- --test-threads=1

  build:
    desc: Build optimized release binary (supports cross TARGET)
    cmds:
      - cargo build --locked --release {{if .TARGET}}--target {{.TARGET}}{{end}}

  # Python core support (for agent/llm loop until fully ported)
  py:install:
    desc: Install Python deps (uv)
    cmds:
      - uv sync --all-extras || echo "uv not found or no pyproject"

  py:test:
    desc: Run Python tests
    cmds:
      - uv run pytest -q || echo "no python tests or uv"

  dev:
    desc: Quick dev check (Rust + Python)
    cmds:
      - task: check
      - task: test
      - task: build
      - ./target/release/nib --help || cargo run -- --help

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean
      - find . -type d -name '__pycache__' -exec rm -rf {} + || true
      - rm -rf .venv uv.lock || true
